services:
  - type: web
    name: document-archiver
    runtime: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # ستُضاف يدوياً من لوحة تحكم Render
      - key: MONGODB_DB
        value: document-archiver
      - key: NEXTAUTH_SECRET
        sync: false  # ستُضاف يدوياً من لوحة تحكم Render
      - key: NEXTAUTH_URL
        sync: false  # ستُضاف يدوياً بعد معرفة الرابط
    healthCheckPath: /
    autoDeploy: true
    plan: free
